<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cogitron V6 - Multi-IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00d4ff; --pink: #ff007f; --bg: #0a0b10; --card: #161925; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #11131f; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .logo { font-family: 'Rajdhani'; color: var(--blue); font-size: 1.8rem; text-shadow: 0 0 10px var(--blue); text-align: center; margin-bottom: 20px; }
        .main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg); }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 30px 10%; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: #2b2d3e; border-right: 4px solid var(--pink); }
        .bot { align-self: flex-start; background: #1e2235; border-left: 4px solid var(--blue); }
        .grid-prof { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .sub-btn { background: #1c1e2d; color: #aaa; border: 1px solid #333; padding: 8px; font-size: 0.75rem; border-radius: 6px; cursor: pointer; }
        .input-box { padding: 20px; background: #0d0e14; border-top: 1px solid #222; }
        .input-wrap { display: flex; background: #1c1e2d; border-radius: 12px; padding: 5px 15px; max-width: 900px; margin: 0 auto; align-items: center; }
        input { flex-grow: 1; background: none; border: none; color: white; outline: none; padding: 12px; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); padding: 35px; border-radius: 25px; width: 340px; text-align: center; }
        .auth-card input, .auth-card select { width: 100%; margin: 8px 0; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 10px; }
        .btn-main { background: var(--pink); color: white; width: 100%; padding: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 class="logo">COGITRON</h1>
            <input type="email" id="email" placeholder="Ton Email">
            <input type="password" id="pass" placeholder="Mot de passe">
            <div id="signup-fields" style="display:none;">
                <input type="text" id="nick" placeholder="Ton Pseudo">
                <select id="user-age">
                    <option value="10">CM1/CM2</option>
                    <option value="13">Collège</option>
                    <option value="16">Lycée</option>
                </select>
            </div>
            <button onclick="handleAuth()" id="btn-auth-main" class="btn-main">CONNEXION</button>
            <button onclick="toggleSignup()" id="btn-switch" style="background:none; color:#888; font-size:0.8rem; margin-top:10px;">S'inscrire</button>
        </div>
    </div>

    <div id="main-app" style="display: none; width:100%;">
        <div class="sidebar">
            <h2 class="logo">COGITRON</h2>
            <div id="user-info" style="font-size:0.75rem; color:var(--blue); text-align:center; margin-bottom:20px;"></div>
            <div class="grid-prof">
                <button class="sub-btn" onclick="startProf('Maths')">📐 Maths</button>
                <button class="sub-btn" onclick="startProf('Français')">✍️ Français</button>
            </div>
            <button onclick="newChat()" style="width:100%; padding:10px; background:var(--blue); color:black;">+ NOUVEAU CHAT</button>
            <div id="history-list" style="flex-grow:1; overflow-y:auto; margin-top:15px;"></div>
            <button onclick="logout()" style="background:none; color:#ff4444; font-size:0.7rem;">Déconnexion</button>
        </div>

        <div class="main">
            <div id="chat-window"></div>
            <div class="input-box">
                <div class="input-wrap">
                    <label for="file-upload" style="cursor:pointer; font-size:1.2rem; margin-right:10px;">📎</label>
                    <input type="file" id="file-upload" style="display:none" onchange="handleFileUpload(this)">
                    <input type="text" id="user-input" placeholder="Demande une image avec /img ou pose une question..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" style="background:var(--blue); padding:10px 20px; color:black; border-radius:8px;">OK</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const GROQ_KEY = "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";
    const MISTRAL_KEY = "aTFjrZjAHSW3zUk0KyKpiVPGj12o6Kur";
    const SB_URL = "https://mrzevhvpoltsobxtkpxe.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yemV2aHZwb2x0c29ieHRrcHhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MTY2MDksImV4cCI6MjA4NjQ5MjYwOX0.4NOt_j0aP02Nh-E_7mJy32hE8Q0ag0gA32PXgxNpSvU";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null, activeChatId = null, chatContext = [];

    // --- MISTRAL : CRÉATION DE TITRE (MAX 5 MOTS) ---
    async function generateTitle(firstMsg) {
        try {
            const res = await fetch("https://api.mistral.ai/v1/chat/completions", {
                method: "POST", headers: {"Authorization": `Bearer ${MISTRAL_KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    model: "mistral-tiny",
                    messages: [{role: "user", content: `Donne moi un titre de maximum 5 mots pour cette discussion : "${firstMsg}"`}]
                })
            });
            const d = await res.json();
            let title = d.choices[0].message.content.replace(/"/g, '');
            await sb.from('chats').update({ title: title }).eq('id', activeChatId);
            loadHistory();
        } catch(e) { console.error("Erreur Titre Mistral"); }
    }

    // --- ENVOI DE MESSAGE ---
    async function send() {
        const input = document.getElementById('user-input'), text = input.value.trim();
        if(!text) return;

        if(!activeChatId) await newChat(text);
        addMsg(text, 'user');
        input.value = '';

        // MODE IMAGE (Pollinations)
        if(text.toLowerCase().startsWith("/img")) {
            const prompt = text.replace("/img", "").trim();
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${Math.floor(Math.random()*1000)}`;
            addMsg(`🎨 Voici ton image pour : *${prompt}*\n\n![Image](${imgUrl})`, 'bot');
            return;
        }

        // MODE CHAT (Llama 3.3 via Groq)
        chatContext.push({role: "user", content: text});
        const age = currentUser.user_metadata.age;
        
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST", headers: {"Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json"},
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [{role: "system", content: `Tu es Cogitron pour un enfant de ${age} ans.`}, ...chatContext.slice(-6)]
            })
        });
        const d = await res.json();
        const reply = d.choices[0].message.content;
        addMsg(reply, 'bot');
        chatContext.push({role: "assistant", content: reply});
    }

    // --- LECTURE FICHIER (Simulé via Gemini/URL) ---
    async function handleFileUpload(input) {
        const file = input.files[0];
        if (file) {
            addMsg(`📄 Fichier joint : **${file.name}** (Analyse en cours...)`, 'user');
            // Ici tu peux envoyer le fichier vers une API Gemini Vision ou simplement simuler la lecture
            setTimeout(() => addMsg("J'ai bien lu ton document ! Que veux-tu que j'en fasse ?", "bot"), 2000);
        }
    }

    // --- AUTH & UI ---
    async function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(isSignupMode) {
            const n = document.getElementById('nick').value, a = document.getElementById('user-age').value;
            const {error} = await sb.auth.signUp({email:e, password:p, options:{data:{nickname:n, age:a}}});
            if(error) alert(error.message); else alert("Vérifie tes emails !");
        } else {
            const {error} = await sb.auth.signInWithPassword({email:e, password:p});
            if(error) alert("Erreur connexion.");
        }
    }

    async function newChat(firstText = "Nouvelle Discussion") {
        const {data} = await sb.from('chats').insert([{user_id: currentUser.id, title: "En cours..."}]).select();
        activeChatId = data[0].id;
        chatContext = [];
        document.getElementById('chat-window').innerHTML = '';
        if(firstText !== "Nouvelle Discussion") generateTitle(firstText);
    }

    function addMsg(t, type) {
        const d = document.createElement('div'); d.className = `msg ${type}`;
        d.innerHTML = marked.parse(t);
        document.getElementById('chat-window').appendChild(d);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function toggleSignup() { isSignupMode = !isSignupMode; document.getElementById('signup-fields').style.display = isSignupMode ? 'block' : 'none'; }
    function logout() { sb.auth.signOut(); location.reload(); }
    sb.auth.onAuthStateChange((ev, sess) => { if(sess) { currentUser = sess.user; document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-app').style.display = 'flex'; document.getElementById('user-info').innerText = `${currentUser.user_metadata.nickname}`; loadHistory(); } });

    async function loadHistory() {
        const {data} = await sb.from('chats').select('*').eq('user_id', currentUser.id).order('created_at', {ascending:false});
        const list = document.getElementById('history-list'); list.innerHTML = '';
        data?.forEach(c => {
            const item = document.createElement('div');
            item.style = "padding:8px; background:#1c1e2d; margin-bottom:5px; border-radius:5px; cursor:pointer; font-size:0.7rem;";
            item.innerText = c.title;
            item.onclick = () => { activeChatId = c.id; document.getElementById('chat-window').innerHTML = 'Chargement...'; };
            list.appendChild(item);
        });
    }
</script>
</body>
</html>
